version: '3.8'

services:
  # MongoDB service
  mongodb:
    image: mongo:latest
    container_name: order-processing-mongodb
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_DATABASE=order_processing_db
    volumes:
      - mongodb_data:/data/db
    networks:
      - order-processing-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/order_processing_db --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis service
  redis:
    image: redis:latest
    container_name: order-processing-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - order-processing-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # RabbitMQ service
  rabbitmq:
    image: rabbitmq:3-management
    container_name: order-processing-rabbitmq
    ports:
      - "5672:5672"    # AMQP port
      - "15672:15672"  # Management UI
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - order-processing-network
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 10s
      timeout: 5s
      retries: 5

  # .NET API service
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: order-processing-api
    ports:
      - "5000:5000"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:5000
      - MongoDB__ConnectionString=mongodb://mongodb:27017
      - MongoDB__DatabaseName=order_processing_db
      - Redis__ConnectionString=redis:6379
      - RabbitMQ__HostName=rabbitmq
      - RabbitMQ__Port=5672
      - RabbitMQ__UserName=guest
      - RabbitMQ__Password=guest
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - order-processing-network
    restart: on-failure

volumes:
  mongodb_data:
    driver: local
  redis_data:
    driver: local
  rabbitmq_data:
    driver: local

networks:
  order-processing-network:
    driver: bridge
